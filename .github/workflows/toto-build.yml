name: Unit Test Docker Image Build and Run

on:
  push:
    branches: [ advanced-tests ]

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3


    
    - name: Build Toto Test Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./toto.dockerfile
        push: false
        load: true  
        tags: imagebin-api:toto

    - name: Run Unit Tests
      run: |
        docker run --rm imagebin-api:toto
