name: Unit Test Docker Image Build and Run

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'version number '
        required: true
        default: 'v1.0.0'
        type: string

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3


    
    - name: Build Toto Test Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./toto.dockerfile
        push: false
        load: true  
        tags: imagebin-api:${{ github.event.inputs.version }}-toto

    - name: Run Unit Tests
      run: |
        docker run --rm imagebin-api:${{ github.event.inputs.version }}-toto
